<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pre Job Prep — Homestead Electric</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0f0d; --surface:#111a16; --card:#141f19; --border:#1e2e26; --b2:#243320;
  --teal:#0d9488; --green:#22c55e; --yellow:#eab308; --red:#ef4444;
  --blue:#3b82f6; --orange:#f97316; --text:#e2f0e8; --dim:#6b8c7a; --muted:#2d4a3a;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px; opacity:0.2;
}
#wrap { position:relative; z-index:1; }
.hdr { background:var(--surface); border-bottom:1px solid var(--b2); padding:18px 20px 0; position:sticky; top:0; z-index:100; }
.hdr-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
.brand { font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:0.3em; color:var(--teal); margin-bottom:2px; }
.title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:0.06em; color:var(--text); line-height:1; display:flex; align-items:center; gap:10px; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--teal); box-shadow:0 0 8px var(--teal); animation:pulse 2s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{box-shadow:0 0 6px var(--teal)} 50%{box-shadow:0 0 18px var(--teal)} }
.meta { font-size:11px; color:var(--dim); font-family:'DM Mono',monospace; margin-top:2px; }
.actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn { background:var(--card); border:1px solid var(--b2); border-radius:7px; color:var(--dim); font-family:'DM Mono',monospace; font-size:11px; padding:6px 12px; cursor:pointer; white-space:nowrap; }
.btn:hover { border-color:var(--teal); color:var(--teal); }
.srch { background:var(--bg); border:1px solid var(--b2); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; padding:6px 12px; outline:none; min-width:180px; }
.srch:focus { border-color:var(--teal); }
.srch::placeholder { color:var(--dim); }
.tabs { display:flex; gap:2px; }
.tab { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:0.08em; padding:9px 18px 11px; cursor:pointer; border-bottom:2px solid transparent; color:var(--dim); white-space:nowrap; }
.tab.on { color:var(--teal); border-bottom-color:var(--teal); }
.tc { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:700; background:var(--muted); border-radius:99px; padding:1px 6px; margin-left:5px; vertical-align:middle; }
.tab.on .tc { background:rgba(13,148,136,0.25); color:var(--teal); }
.pills { display:flex; gap:6px; flex-wrap:wrap; padding:10px 0 13px; }
.pill { display:flex; align-items:center; gap:5px; border-radius:99px; padding:3px 11px 3px 7px; font-size:11px; font-weight:600; border:1px solid; cursor:pointer; white-space:nowrap; }
.pill.on { filter:brightness(1.4); }
.pn { font-family:'Bebas Neue',sans-serif; font-size:17px; line-height:1; }
.body { padding:20px 20px 60px; max-width:1000px; }
.grp { margin-bottom:24px; }
.gh { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--b2); }
.gl { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:0.08em; }
.gc { border-radius:99px; padding:2px 9px; font-size:11px; font-weight:700; border:1px solid; }
.gp { margin-left:auto; font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); }
.card { background:var(--card); border:1px solid var(--b2); border-left:3px solid var(--teal); border-radius:12px; margin-bottom:8px; overflow:hidden; }
.card.al { border-color:var(--red); border-left-color:var(--red); background:rgba(239,68,68,0.04); }
.card.dn { border-left-color:var(--green); border-color:rgba(34,197,94,0.2); }
.card.ns { border-left-color:var(--dim); }
.ct { display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:13px 16px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.ct:hover { background:var(--surface); }
.chev { color:var(--dim); font-size:11px; margin-left:auto; flex-shrink:0; transition:transform 0.2s; display:inline-block; }
.chev.op { transform:rotate(90deg); }
.drw { border-top:1px solid var(--b2); background:rgba(0,0,0,0.2); padding:16px 18px; display:none; }
.drw.op { display:block; }
.dl { font-size:10px; font-weight:700; letter-spacing:0.1em; color:var(--dim); font-family:'DM Mono',monospace; margin-bottom:8px; }
.ds { margin-bottom:14px; }
.sg { display:flex; flex-wrap:wrap; gap:6px; }
.sb { padding:6px 12px; border-radius:7px; font-size:11px; font-weight:600; border:1px solid var(--b2); background:var(--card); color:var(--dim); cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.sb:hover { border-color:var(--teal); color:var(--teal); }
.sb.sel { border-color:var(--teal); color:#000; background:var(--teal); }
.sb.ial { border-color:rgba(239,68,68,0.35); color:var(--red); }
.sb.ial.sel { background:var(--red); border-color:var(--red); color:#fff; }
.cr { display:flex; gap:8px; flex-wrap:wrap; }
.ctog { display:flex; align-items:center; gap:7px; cursor:pointer; padding:7px 12px; border-radius:8px; border:1px solid var(--b2); background:var(--card); font-size:12px; user-select:none; -webkit-tap-highlight-color:transparent; }
.ctog:hover { border-color:var(--teal); }
.ctog.on { border-color:var(--green); background:rgba(34,197,94,0.08); color:var(--green); }
.cbox { width:14px; height:14px; border-radius:4px; border:1.5px solid var(--b2); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.ctog.on .cbox { background:var(--green); border-color:var(--green); }
.ntxt { width:100%; background:var(--bg); border:1px solid var(--b2); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; padding:8px 11px; outline:none; resize:vertical; min-height:56px; }
.ntxt:focus { border-color:var(--teal); }
.ntxt::placeholder { color:var(--dim); }
.sf { font-size:10px; font-family:'DM Mono',monospace; color:var(--green); opacity:0; transition:opacity 0.3s; }
.sf.show { opacity:1; }
.pt { display:flex; align-items:center; }
.pd { border-radius:50%; flex-shrink:0; }
.pl { height:1px; flex:1; min-width:4px; }
.badge { display:inline-flex; align-items:center; border-radius:99px; padding:2px 8px; font-size:10px; font-weight:700; border:1px solid; white-space:nowrap; }
.chip { display:flex; align-items:center; gap:4px; font-size:10px; }
.cb { width:11px; height:11px; border-radius:3px; border:1.5px solid var(--b2); flex-shrink:0; }
.cb.dn { background:var(--green); border-color:var(--green); }
.loading { display:flex; align-items:center; justify-content:center; min-height:50vh; flex-direction:column; gap:14px; }
.spin { width:30px; height:30px; border:2px solid var(--b2); border-top-color:var(--teal); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:60px 0; }
.etitle { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.08em; }
.esub { font-size:12px; color:var(--dim); margin-top:6px; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--muted); border-radius:4px; }
</style>
</head>
<body>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="brand">HOMESTEAD ELECTRIC</div>
        <div class="title"><div class="dot"></div>PRE JOB PREP</div>
        <div class="meta" id="meta">Connecting…</div>
      </div>
      <div class="actions">
        <input class="srch" id="srch" placeholder="Search jobs…" oninput="render()"/>
        <button class="btn" onclick="window.loadJobs()">
          <span id="sdot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--dim);margin-right:4px;vertical-align:middle"></span>
          <span id="slbl">Refresh</span>
        </button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab on" id="t-prep" onclick="setTab('prep')">PREP PIPELINE <span class="tc" id="tc-prep">0</span></div>
      <div class="tab" id="t-done" onclick="setTab('done')">JOB PREP COMPLETE <span class="tc" id="tc-done">0</span></div>
    </div>
    <div class="pills" id="pills"></div>
  </div>
  <div class="body" id="body">
    <div class="loading">
      <div class="spin"></div>
      <div style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace">Connecting to Firebase…</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyAQl6V74U502_ZHF3h_1W0yYDuKr2mLI5Q",
  authDomain:"homestead-electric.firebaseapp.com",
  projectId:"homestead-electric",
  storageBucket:"homestead-electric.firebasestorage.app",
  messagingSenderId:"318598172684",
  appId:"1:318598172684:web:b2ef548d952faabccd9e29"
}));

const STAGES = [
  'Redline Walk Scheduled','Redline Walk Completed','Redline CO Doc Made',
  'Redline Plans Made','Redline CO Sent','Redline CO Signed',
  'Redline Plans Need to be Updated','Job Prep Complete'
];
const ALERT = 'Redline Plans Need to be Updated';
const FC = { Koy:'#3b82f6', Vasa:'#f97316', Colby:'#22c55e' };

let jobs = [], tab = 'prep', pill = null, openCards = {}, lastUp = null, timers = {}, unsub = null;

window.loadJobs = function() {
  setSyncing('loading');
  if (unsub) unsub();
  unsub = onSnapshot(collection(db, 'jobs'),
    function(snap) {
      jobs = snap.docs.map(function(d) { return d.data() && d.data().data; }).filter(Boolean).map(migrate);
      lastUp = new Date(); setSyncing('ok'); render();
    },
    function(err) { console.error(err); setSyncing('err'); }
  );
};

function migrate(j) {
  var rm = {"Pre-Wire":"0%","Rough-In":"25%","Rough Inspection":"75%","Rough Complete":"100%"};
  var fm = {"Fixtures Ordered":"0%","Finish Scheduled":"20%","Finish In Progress":"50%","Punch List":"75%","CO / Final":"90%","Complete":"100%"};
  return Object.assign({}, j, { roughStage: rm[j.roughStage]||j.roughStage||"0%", finishStage: fm[j.finishStage]||j.finishStage||"0%" });
}

function saveJob(job) {
  clearTimeout(timers[job.id]);
  timers[job.id] = setTimeout(function() {
    setDoc(doc(db, 'jobs', job.id), { data: job, updated_at: new Date().toISOString() })
      .then(function() {
        var el = document.getElementById('sf-' + job.id);
        if (el) { el.classList.add('show'); setTimeout(function() { el.classList.remove('show'); }, 2000); }
      })
      .catch(function(e) { console.error('Save failed:', e); });
  }, 400);
}

function patchJob(id, fields) {
  var idx = jobs.findIndex(function(j) { return j.id === id; });
  if (idx < 0) return;
  jobs[idx] = Object.assign({}, jobs[idx], fields);
  saveJob(jobs[idx]); render();
}

function setSyncing(state) {
  var dot = document.getElementById('sdot'), lbl = document.getElementById('slbl');
  if (state === 'loading') { dot.style.background='#eab308'; lbl.textContent='Loading…'; }
  else if (state === 'ok') { dot.style.background='#22c55e'; lbl.textContent='Live ●'; }
  else { dot.style.background='#ef4444'; lbl.textContent='Error'; }
}

window.setTab = function(t) {
  tab = t; pill = null;
  document.getElementById('t-prep').className = 'tab' + (t==='prep'?' on':'');
  document.getElementById('t-done').className = 'tab' + (t==='done'?' on':'');
  render();
};
window.setPill  = function(s) { pill = (pill===s)?null:s; render(); };
window.togCard  = function(id) { openCards[id] = !openCards[id]; render(); };
window.setStage = function(id, s) { patchJob(id, { prepStage: s }); };
window.togField = function(id, f) {
  var job = jobs.find(function(j) { return j.id===id; });
  if (!job) return;
  var p = {}; p[f] = !job[f]; patchJob(id, p);
};
window.saveNotes = function(id, v) { patchJob(id, { prepNotes: v }); };

function stageColor(s) {
  if (!s) return '#6b8c7a';
  if (s===ALERT) return '#ef4444';
  var i = STAGES.indexOf(s); if (i<0) return '#6b8c7a';
  var p = i/(STAGES.length-1);
  return p<0.25?'#6b8c7a':p<0.55?'#eab308':'#0d9488';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function matchSearch(j,s) {
  return (j.name||'').toLowerCase().includes(s)||(j.gc||'').toLowerCase().includes(s)||
         (j.address||'').toLowerCase().includes(s)||(j.foreman||'').toLowerCase().includes(s);
}

window.render = function() {
  var s = (document.getElementById('srch')||{value:''}).value.toLowerCase();
var prep = jobs.filter(function(j){ return (j.prepStage||'') !== 'Job Prep Complete'; });
  var done = jobs.filter(function(j){ return (j.prepStage||'') === 'Job Prep Complete'; });
  document.getElementById('tc-prep').textContent = prep.length;
  document.getElementById('tc-done').textContent = done.length;
  var ts = lastUp ? lastUp.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('meta').textContent = prep.length+' in pipeline · '+done.length+' complete'+(ts?' · '+ts:'');
  if (tab==='prep') renderPrep(prep,s); else renderDone(done,s);
};

function renderPrep(prep,s) {
  var order = ['— No Stage Set —'].concat(STAGES.filter(function(x){ return x!=='Job Prep Complete'; }));
  var grps = {};
  prep.forEach(function(j){ var k=j.prepStage||'— No Stage Set —'; if(!grps[k])grps[k]=[]; grps[k].push(j); });
  document.getElementById('pills').innerHTML = order.filter(function(k){ return grps[k]&&grps[k].length; }).map(function(k){
    var c=stageColor(k==='— No Stage Set —'?'':k), on=pill===k?' on':'', lbl=k==='— No Stage Set —'?'No Stage':k;
    return '<div class="pill'+on+'" style="color:'+c+';border-color:'+c+'44;background:'+c+'12" onclick="setPill('+JSON.stringify(k)+')">'
      +'<span class="pn">'+grps[k].length+'</span><span>'+esc(lbl)+'</span></div>';
  }).join('');
  document.getElementById('pills').style.display='';
  var disp={};
  (pill?[pill]:order).forEach(function(k){ if(grps[k]&&grps[k].length)disp[k]=grps[k]; });
  if(s) Object.keys(disp).forEach(function(k){ disp[k]=disp[k].filter(function(j){return matchSearch(j,s);}); if(!disp[k].length)delete disp[k]; });
  var keys=order.filter(function(k){ return disp[k]&&disp[k].length; });
  var body=document.getElementById('body');
  if(!keys.length){
    body.innerHTML=!prep.length&&!s
      ?'<div class="empty"><div style="font-size:44px;margin-bottom:12px">✅</div><div class="etitle" style="color:#22c55e">ALL JOBS PREPPED</div><div class="esub">Nothing left in the pipeline</div></div>'
      :'<div class="empty"><div style="font-size:36px;margin-bottom:12px">🔍</div><div class="etitle" style="color:var(--dim)">NO RESULTS</div><div class="esub">Try a different search or filter</div></div>';
    return;
  }
  body.innerHTML=keys.map(function(k){
    var isNone=k==='— No Stage Set —', c=stageColor(isNone?'':k), idx=STAGES.indexOf(k);
    var pct=idx<0?0:Math.round((idx/(STAGES.length-1))*100);
    return '<div class="grp"><div class="gh"><div class="gl" style="color:'+c+'">'+(k===ALERT?'⚠ ':'')+esc(isNone?'No Stage Set':k)+'</div>'
      +'<div class="gc" style="color:'+c+';border-color:'+c+'33;background:'+c+'12">'+disp[k].length+' job'+(disp[k].length!==1?'s':'')+'</div>'
      +(!isNone?'<span class="gp">'+pct+'% THROUGH PREP</span>':'')+'</div>'
      +disp[k].map(function(j){return jobCard(j,c,false);}).join('')+'</div>';
  }).join('');
}

function renderDone(done,s) {
  document.getElementById('pills').innerHTML=''; document.getElementById('pills').style.display='none';
  var jobs2=s?done.filter(function(j){return matchSearch(j,s);}):done;
  var body=document.getElementById('body');
  if(!jobs2.length){ body.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:12px">📋</div><div class="etitle" style="color:var(--dim)">'+(s?'NO RESULTS':'NONE YET')+'</div><div class="esub">'+(s?'Try a different search':'No jobs have completed prep yet')+'</div></div>'; return; }
  body.innerHTML='<div class="grp"><div class="gh"><div class="gl" style="color:#22c55e">JOB PREP COMPLETE</div>'
    +'<div class="gc" style="color:#22c55e;border-color:#22c55e33;background:#22c55e12">'+jobs2.length+' job'+(jobs2.length!==1?'s':'')+'</div></div>'
    +jobs2.map(function(j){return jobCard(j,'#22c55e',true);}).join('')+'</div>';
}

function jobCard(job,gc,isDone) {
  var fm=job.foreman||'Koy', fc=FC[fm]||'#6b8c7a';
  var isAl=!isDone&&job.prepStage===ALERT, isOp=openCards[job.id], jid=JSON.stringify(job.id);
  var dstages=STAGES.filter(function(s){return s!=='Job Prep Complete';}), ci=STAGES.indexOf(job.prepStage||'');
  var dots=dstages.map(function(s,i){
    var dn=isDone||ci>=i, isc=!isDone&&job.prepStage===s, ia=s===ALERT;
    var dc=(ia&&isc)?'var(--red)':dn?gc:'#243320', sz=isc?11:7;
    var bd=isc?'border:2px solid '+(ia?'var(--red)':gc)+';':'';
    var line=i<dstages.length-1?'<div class="pl" style="background:'+(dn?gc:'#243320')+'"></div>':'';
    return '<div class="pd" title="'+esc(s)+'" style="width:'+sz+'px;height:'+sz+'px;background:'+dc+';'+bd+'"></div>'+line;
  }).join('');
  var badges='';
  if(job.readyToSchedule) badges+='<span class="badge" style="color:#22c55e;border-color:#22c55e33;background:#22c55e10">✓ Ready to Schedule</span> ';
  if(isAl) badges+='<span class="badge" style="color:var(--red);border-color:#ef444433;background:#ef444410">⚠ Plans Need Update</span>';
  var bl=isAl?'var(--red)':isDone?'#22c55e':fc;
  var cls='card'+(isAl?' al':isDone?' dn':!job.prepStage?' ns':'');
  var sgrid=STAGES.map(function(s){
    var sel=job.prepStage===s, ia=s===ALERT, fin=s==='Job Prep Complete';
    return '<button class="sb'+(ia?' ial':'')+(sel?' sel':'')+'" onclick="setStage('+jid+','+JSON.stringify(s)+')">'+(ia?'⚠ ':fin?'✓ ':'')+esc(s)+'</button>';
  }).join('');
  var checks=[['jobAccount','Job Account Created'],['preLien','Pre-lien Filed'],['readyToSchedule','Ready to Schedule']].map(function(pair){
    var f=pair[0],lbl=pair[1],on=!!job[f];
    return '<div class="ctog'+(on?' on':'')+'" onclick="togField('+jid+','+JSON.stringify(f)+')">'
      +'<div class="cbox">'+(on?'<span style="color:#000;font-size:9px;font-weight:900">✓</span>':'')+'</div>'
      +'<span>'+lbl+'</span></div>';
  }).join('');
  var stageLabel=isDone?'✓ Job Prep Complete':job.prepStage?(isAl?'⚠ ':'')+esc(job.prepStage):'<span style="color:var(--dim)">No stage set</span>';
  return '<div class="'+cls+'" style="border-left-color:'+bl+'">'
    +'<div class="ct" onclick="togCard('+jid+')">'
    +'<div style="flex:0 0 200px;min-width:120px"><div style="font-weight:600;font-size:13px;color:var(--text)">'+esc(job.name||'Untitled Job')+'</div>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:2px"><span style="color:'+fc+';font-weight:600;margin-right:5px">'+esc(fm)+'</span>'+esc(job.gc||'No GC')+'</div>'
    +(job.address?'<div style="font-size:10px;color:var(--muted);margin-top:1px">'+esc(job.address)+'</div>':'')+'</div>'
    +'<div style="flex:1 1 160px;min-width:110px"><div style="font-size:9px;color:'+gc+';font-weight:700;letter-spacing:0.1em;margin-bottom:4px">PREP STAGE</div>'
    +'<div class="pt">'+dots+'</div>'
    +'<div style="font-size:10px;color:'+(isAl?'var(--red)':gc)+';margin-top:3px;font-weight:'+(isAl?700:500)+'">'+stageLabel+'</div></div>'
    +'<div style="display:flex;gap:8px;flex-shrink:0">'
    +'<div class="chip"><div class="cb'+(job.jobAccount?' dn':'')+'"></div><span style="color:'+(job.jobAccount?'#22c55e':'var(--dim)')+'">Acct</span></div>'
    +'<div class="chip"><div class="cb'+(job.preLien?' dn':'')+'"></div><span style="color:'+(job.preLien?'#22c55e':'var(--dim)')+'">Lien</span></div>'
    +'</div>'
    +(badges?'<div style="display:flex;gap:5px;flex-wrap:wrap">'+badges+'</div>':'')
    +'<div class="chev'+(isOp?' op':'')+'">▶</div></div>'
    +'<div class="drw'+(isOp?' op':'')+'">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    +'<div style="font-size:11px;color:var(--teal);font-weight:700;letter-spacing:0.06em">✎ '+esc(job.name||'Untitled Job')+'</div>'
    +'<span class="sf" id="sf-'+job.id+'">✓ Saved</span></div>'
    +'<div class="ds"><div class="dl">PREP STAGE</div><div class="sg">'+sgrid+'</div></div>'
    +'<div class="ds"><div class="dl">CHECKLIST</div><div class="cr">'+checks+'</div></div>'
    +'<div class="ds" style="margin-bottom:0"><div class="dl">PREP NOTES</div>'
    +'<textarea class="ntxt" placeholder="Notes on this job…" onchange="saveNotes('+jid+',this.value)">'+esc(job.prepNotes||'')+'</textarea>'
    +'</div></div></div>';
}

window.loadJobs();
</script>
</body>
</html>
